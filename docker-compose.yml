services:
  web:
    build: .
    ports:
      - "8010:8000"
    environment:
      # Cambia estos valores en producción.
      SECRET_KEY: "cambia-esta-clave-secreta"
      ADMIN_PASSWORD: "admin123"
    volumes:
      # Un solo volumen persistente: la BD y los logos subidos viven en /app/instance.
      - quiniela_db:/app/instance
    restart: unless-stopped

volumes:
  quiniela_db:
