# fly.toml app configuration file generated for quiniela-interna-rpci on 2026-07-06T17:48:49Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'quiniela-interna-rpci'
primary_region = 'ams'

# Disco persistente para la base de datos SQLite (que vive en /app/instance).
# Sin esto, los datos se borran en cada reinicio/deploy.
[mounts]
  source = 'vol_40o6wd29xymyxek4'
  destination = '/app/instance'

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
