{% extends "base.html" %}
{% block title %}Admin · Iniciar sesión{% endblock %}

{% block content %}
  <section class="card">
    <h2 class="section-title">Administración</h2>
    <form method="post" action="{{ url_for('admin.login') }}">
      <label class="field-label" for="password">Contraseña</label>
      <input class="input" type="password" name="password" id="password" required autofocus>
      <button class="btn btn-primary btn-block" type="submit">Entrar</button>
    </form>
  </section>
{% endblock %}
